name: Feedback / Bug report
description: Report a bug or share feedback about Haruspex
title: '[Feedback] '
labels: [feedback]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the feedback! Most of the fields below are pre-filled
        from the running app. **Please skim them before submitting** — the
        settings snapshot and search stats are personal-to-your-install
        data; edit or delete anything you don't want public.

        If logs from a specific sidecar (LLM, whisper, TTS) would help
        diagnose the issue, click **Save Full Diagnostics** in
        Settings → Feedback to export the full bundle and drag the
        resulting `.md` file into this issue as an attachment.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What were you trying to do, and what went wrong (or what would you like to see)?
      placeholder: I clicked X, expected Y, got Z.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Haruspex version
      placeholder: e.g. 0.1.37

  - type: textarea
    id: system
    attributes:
      label: System
      description: OS, architecture, and runtime info auto-detected by the app.
      render: shell

  - type: textarea
    id: settings
    attributes:
      label: Settings snapshot
      description: Relevant inference and agent settings. Secrets are redacted by the app.
      render: json

  - type: textarea
    id: stats
    attributes:
      label: Search stats (session)
      description: |
        Per-engine web-search performance from this app run — attempts,
        success rate, mean/max latency, and failure-mode breakdown. Helps
        diagnose auto-rotate or scraper-related issues. Lifetime stats
        and full logs are in the saved diagnostics bundle.
      render: shell
