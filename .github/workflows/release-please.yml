name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-24.04
    outputs:
      pr: ${{ steps.release.outputs.pr }}
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  sync-cargo-lock:
    # When release-please opens or updates a release PR, the Cargo.toml bump
    # leaves src-tauri/Cargo.lock stale. Sync it on the PR branch so merging
    # to main doesn't leave a dirty lockfile behind.
    needs: release-please
    if: ${{ needs.release-please.outputs.pr }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Update Cargo.lock for new haruspex version
        working-directory: src-tauri
        # Touch just the haruspex package entry; --workspace would drag in
        # every transitive dep bump and inflate the lockfile diff.
        run: cargo update --package haruspex
      - name: Commit lockfile bump if needed
        run: |
          if git diff --quiet src-tauri/Cargo.lock; then
            echo "Cargo.lock already in sync"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/Cargo.lock
          git commit -m "chore: sync Cargo.lock"
          git push
