name: Build Sidecars
on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Some runner images ship a `cargo` shim in /usr/local/bin that's
      # actually rustup-init; without this, that shim wins over the real
      # cargo dtolnay installs at ~/.cargo/bin and `cargo build` fails
      # with `unexpected argument 'build' found` from rustup-init.
      - name: Ensure cargo on PATH
        shell: bash
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: sidecars-${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev glslc libsonic-dev libpcaudio-dev libssl-dev pkg-config

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install opus pkg-config

      # See release.yml: the distro glslc/Vulkan headers are too old for the
      # pinned llama.cpp Vulkan backend, so the GPU build silently falls back to
      # CPU. Pull LunarG's SDK so the Vulkan build succeeds.
      - name: Install Vulkan SDK (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          curl -fsSL -o /tmp/vulkan-sdk.tar.xz \
            "https://sdk.lunarg.com/sdk/download/latest/linux/vulkan_sdk.tar.xz"
          DEST="$HOME/vulkan-sdk"
          mkdir -p "$DEST"
          tar -xf /tmp/vulkan-sdk.tar.xz -C "$DEST"
          SDK_ROOT="$(find "$DEST" -maxdepth 2 -name setup-env.sh -printf '%h\n' | head -1)"
          echo "Installed Vulkan SDK at $SDK_ROOT"
          echo "VULKAN_SDK=${SDK_ROOT}/x86_64" >> "$GITHUB_ENV"
          echo "${SDK_ROOT}/x86_64/bin" >> "$GITHUB_PATH"

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.4.313.2
          install_runtime: true
          cache: true

      - name: Build sidecars
        shell: bash
        run: ./scripts/build-sidecars.sh --target ${{ matrix.target }}

      - name: Upload sidecar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sidecars-${{ matrix.target }}
          path: |
            src-tauri/binaries/*
          retention-days: 7
