name: Build Sidecars
on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-15
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Some runner images ship a `cargo` shim in /usr/local/bin that's
      # actually rustup-init; without this, that shim wins over the real
      # cargo dtolnay installs at ~/.cargo/bin and `cargo build` fails
      # with `unexpected argument 'build' found` from rustup-init.
      - name: Ensure cargo on PATH
        shell: bash
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: sidecars-${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev glslc libsonic-dev libpcaudio-dev libssl-dev pkg-config

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install opus pkg-config

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.3.290.0
          install_runtime: true
          cache: true

      - name: Build sidecars
        shell: bash
        run: ./scripts/build-sidecars.sh --target ${{ matrix.target }}

      - name: Upload sidecar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sidecars-${{ matrix.target }}
          path: |
            src-tauri/binaries/*
          retention-days: 7
