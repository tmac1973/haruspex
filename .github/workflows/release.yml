name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: true
        type: string

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: |
          VERSION="${{ inputs.version }}"
          # Update version in all files (npm version errors if already at target)
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          # Only commit if there are changes
          if git diff --quiet; then
            echo "Version already at $VERSION, skipping commit"
          else
            git add package.json package-lock.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
            git commit -m "chore: bump version to $VERSION"
            git push
          fi
          git tag -f "v$VERSION"
          git push origin "v$VERSION" --force

  build-sidecars:
    needs: bump-version
    uses: ./.github/workflows/build-sidecars.yml

  create-release:
    needs: bump-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}
      - id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          draft: true
          generate_release_notes: true

  build-app:
    needs: [build-sidecars, create-release]
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - platform: macos-13
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libasound2-dev

      - name: Download sidecars
        uses: actions/download-artifact@v4
        with:
          name: sidecars-${{ matrix.target }}
          path: src-tauri/binaries/

      - name: Set sidecar permissions
        if: runner.os != 'Windows'
        run: chmod +x src-tauri/binaries/*-${{ matrix.target }}*

      - run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERT }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: v${{ inputs.version }}
          releaseName: 'Haruspex v${{ inputs.version }}'
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
