name: Release

# One workflow for the full release pipeline:
#   1. release-please-action manages an open "release" PR on main with a
#      generated CHANGELOG.md. Merging that PR creates a tag and a draft
#      GitHub Release.
#   2. sync-cargo-lock keeps src-tauri/Cargo.lock in sync with the version
#      bump on the open release PR branch.
#   3. If release-please created a release on this run, the build matrix
#      compiles the Tauri app on each platform and attaches the bundles
#      to the draft release.
#
# All steps live in the same workflow because GitHub does NOT fire
# downstream workflows from events created by the default GITHUB_TOKEN
# (so a separate `push: tags` workflow wouldn't run without a PAT).
# Gating the build job on release-please's action outputs works without
# a PAT.
#
# A workflow_dispatch input lets you (re)build a specific tag manually
# from the Actions UI — useful if a build job fails and you need to
# retry without waiting for another release PR.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re)build (e.g. v0.1.26)'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    outputs:
      pr: ${{ steps.release.outputs.pr }}
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  sync-cargo-lock:
    # When release-please opens or updates a release PR, the Cargo.toml bump
    # leaves src-tauri/Cargo.lock stale. Sync it on the PR branch so merging
    # to main doesn't leave a dirty lockfile behind.
    needs: release-please
    if: ${{ github.event_name == 'push' && needs.release-please.outputs.pr }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Update Cargo.lock for new haruspex version
        working-directory: src-tauri
        # Touch just the haruspex package entry; --workspace would drag in
        # every transitive dep bump and inflate the lockfile diff.
        run: cargo update --package haruspex
      - name: Commit lockfile bump if needed
        run: |
          if git diff --quiet src-tauri/Cargo.lock; then
            echo "Cargo.lock already in sync"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/Cargo.lock
          git commit -m "chore: sync Cargo.lock"
          git push

  build:
    needs: [release-please]
    # Run when:
    #   - push event AND release-please just created a release
    #   - manual dispatch (regardless of release-please's status)
    if: |
      always() && (
        (github.event_name == 'push' && needs.release-please.outputs.release_created == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - platform: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            tauri_args: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            tauri_args: ''
          - platform: macos-latest
            target: aarch64-apple-darwin
            tauri_args: '--target aarch64-apple-darwin'
          - platform: macos-15
            target: x86_64-apple-darwin
            tauri_args: '--target x86_64-apple-darwin'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-15' && 'x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: release-${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libasound2-dev \
            libvulkan-dev glslc libsonic-dev libpcaudio-dev libssl-dev pkg-config \
            libfuse2t64

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install opus pkg-config

      - name: Install Vulkan SDK (Windows)
        if: runner.os == 'Windows'
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.3.290.0
          install_runtime: true
          cache: true

      - name: Build sidecars
        shell: bash
        run: ./scripts/build-sidecars.sh --target ${{ matrix.target }}

      - name: Ensure resource directories exist
        shell: bash
        run: |
          mkdir -p src-tauri/binaries/libs
          touch src-tauri/binaries/libs/.placeholder
          # espeak-ng-data may not exist if koko bundling didn't find espeak data
          if [ ! -f src-tauri/binaries/espeak-ng-data/phontab ]; then
            mkdir -p src-tauri/binaries/espeak-ng-data/lang/placeholder
            touch src-tauri/binaries/espeak-ng-data/.placeholder
            touch src-tauri/binaries/espeak-ng-data/lang/.placeholder
            touch src-tauri/binaries/espeak-ng-data/lang/placeholder/.placeholder
          fi

      - name: Build app
        shell: bash
        run: |
          npm ci
          if [ "$RUNNER_OS" = "Linux" ]; then
            NO_STRIP=1 LD_LIBRARY_PATH="$PWD/src-tauri/binaries/libs:$PWD/src-tauri/binaries" \
              npm run tauri build -- --bundles appimage,deb,rpm ${{ matrix.tauri_args }}
          elif [ "$RUNNER_OS" = "Windows" ]; then
            npm run tauri build -- --bundles nsis,msi ${{ matrix.tauri_args }}
          else
            npm run tauri build -- ${{ matrix.tauri_args }}
          fi

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || needs.release-please.outputs.tag_name }}
          draft: true
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
