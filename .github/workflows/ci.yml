name: CI
on: [push, pull_request]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run check
      - run: npm run test

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libasound2-dev

      - name: Create placeholder sidecar binaries and libs
        run: |
          TARGET=$(rustc --print host-tuple)
          mkdir -p src-tauri/binaries
          for name in llama-server whisper-server koko; do
            echo '#!/bin/sh' > "src-tauri/binaries/${name}-${TARGET}"
            chmod +x "src-tauri/binaries/${name}-${TARGET}"
          done
          # Create dirs with placeholders for resources globs
          mkdir -p src-tauri/binaries/libs
          touch src-tauri/binaries/libs/.placeholder
          mkdir -p src-tauri/binaries/espeak-ng-data/lang/placeholder
          touch src-tauri/binaries/espeak-ng-data/.placeholder
          touch src-tauri/binaries/espeak-ng-data/lang/.placeholder
          touch src-tauri/binaries/espeak-ng-data/lang/placeholder/.placeholder

      - run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml
