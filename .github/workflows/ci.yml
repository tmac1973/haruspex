name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run check
      - run: npm run test
      # Regression guard for the chat<->sandbox import cycle fixed in the
      # architecture audit (A1). madge can't resolve SvelteKit's $lib alias,
      # so it silently misses these cycles (audit A6) — a grep guard is the
      # reliable check. The sandbox/worker + sandbox-tool layers read ambient
      # state from stores/session.svelte + sandboxApproval.svelte, never from
      # the chat store.
      - name: Guard against chat<->sandbox import cycle
        run: |
          if grep -rn "stores/chat\.svelte" src/lib/sandbox/ src/lib/agent/tools/; then
            echo "::error::sandbox/ and agent/tools/ must not import the chat store — it reintroduces the chat<->sandbox cycle (see audits/architecture-2026-06-09.md, findings A1/A6). Read the ambient id/workdir from stores/session.svelte instead."
            exit 1
          fi
      # IPC drift guards (audit findings X2/X3): every TS invoke() literal
      # must name a command registered in lib.rs, and the generated command
      # constant must be current.
      - name: Check IPC command names
        run: node scripts/check-ipc.mjs

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Some runner images ship a `cargo` shim in /usr/local/bin that's
      # actually rustup-init; without this, that shim wins over the real
      # cargo dtolnay installs at ~/.cargo/bin and `cargo build` fails
      # with `unexpected argument 'build' found` from rustup-init.
      - name: Ensure cargo on PATH
        shell: bash
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libasound2-dev

      - name: Create placeholder sidecar binaries and libs
        run: |
          TARGET=$(rustc --print host-tuple)
          mkdir -p src-tauri/binaries
          for name in llama-server whisper-server koko ruff; do
            echo '#!/bin/sh' > "src-tauri/binaries/${name}-${TARGET}"
            chmod +x "src-tauri/binaries/${name}-${TARGET}"
          done
          # Create dirs with placeholders for resources globs
          mkdir -p src-tauri/binaries/libs
          touch src-tauri/binaries/libs/.placeholder
          mkdir -p src-tauri/binaries/espeak-ng-data/lang/placeholder
          touch src-tauri/binaries/espeak-ng-data/.placeholder
          touch src-tauri/binaries/espeak-ng-data/lang/.placeholder
          touch src-tauri/binaries/espeak-ng-data/lang/placeholder/.placeholder

      # --locked turns a stale Cargo.lock into a hard failure instead of a
      # silent in-CI regeneration. This is the guard that keeps release-please
      # PRs from merging with an unsynced lockfile: the release PR bumps
      # Cargo.toml, so this check stays red until release.yml's
      # sync-cargo-lock job pushes the matching lockfile commit (merging
      # inside that job's ~20s window is what let v0.1.53 land with a stale
      # lock). It equally catches human PRs that bump a dep without
      # committing the lockfile.
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - run: cargo clippy --locked --manifest-path src-tauri/Cargo.toml -- -D warnings
      - run: cargo test --locked --manifest-path src-tauri/Cargo.toml
      # ts-rs bindings freshness (audit finding X3): the committed
      # src/lib/ipc/gen/ types must match what the Rust structs generate.
      # cargo test above already ran the export tests (into the gitignored
      # default dir); this re-export targets the committed location.
      - name: Check generated IPC types are current
        run: |
          TS_RS_EXPORT_DIR="$PWD/src/lib/ipc/gen" cargo test --manifest-path src-tauri/Cargo.toml export_bindings
          git diff --exit-code -- src/lib/ipc/gen || {
            echo "::error::src/lib/ipc/gen is stale — run scripts/export-ipc-types.sh and commit the result."
            exit 1
          }

  # Windows gates for the Shell-tab port (Phase 17). The whole point is to
  # compile + lint the `#[cfg(windows)]` branches (code_tools.rs, sidecar_utils.rs,
  # and the upcoming catalog/winps/wsl modules) that the Linux `backend` job never
  # touches, plus the type-check + unit tests against Windows path/line-ending
  # behavior. Single combined job — Windows runner minutes bill at a higher rate
  # than the Linux frontend/backend split.
  #
  # It's slow (~15 min), so it does NOT run on every PR. It runs only on a
  # manual dispatch (Actions tab → CI → Run workflow) or when a PR carries the
  # `windows-ci` label. Add that label to Shell-tab / Phase-17 / fs_tools PRs;
  # everything else skips it. (To restore a post-merge safety net, add
  # `github.event_name == 'push'` to the condition below.)
  windows:
    runs-on: windows-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'windows-ci')
    steps:
      # Check out with LF intact so rustfmt/prettier and `git diff` aren't fooled
      # by CRLF churn on the Windows runner (autocrlf defaults to true there).
      - name: Disable autocrlf
        run: git config --global core.autocrlf false
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Type-check + unit tests catch Windows-specific path / line-ending logic
      # bugs (cf. the CRLF pyodide-resolver fix). lint/format:check are
      # platform-independent and already covered by the ubuntu `frontend` job.
      - run: npm run check
      - run: npm run test

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # windows-latest already ships the MSVC C++ build tools + WebView2, so no
      # system-dependency install step is needed (unlike the Linux backend job).

      - name: Create placeholder sidecar binaries and libs
        shell: pwsh
        run: |
          $target = (rustc --print host-tuple)
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          foreach ($name in 'llama-server', 'whisper-server', 'koko', 'ruff') {
            # externalBin resolves to `<name>-<triple>.exe` on Windows.
            Set-Content -Path "src-tauri/binaries/$name-$target.exe" -Value '@echo off'
          }
          # Placeholder dirs/files for the resources globs in tauri.conf.json.
          New-Item -ItemType Directory -Force -Path src-tauri/binaries/libs | Out-Null
          New-Item -ItemType Directory -Force -Path src-tauri/binaries/espeak-ng-data/lang/placeholder | Out-Null
          Set-Content -Path src-tauri/binaries/libs/.placeholder -Value ''
          Set-Content -Path src-tauri/binaries/espeak-ng-data/.placeholder -Value ''
          Set-Content -Path src-tauri/binaries/espeak-ng-data/lang/.placeholder -Value ''
          Set-Content -Path src-tauri/binaries/espeak-ng-data/lang/placeholder/.placeholder -Value ''

      - run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - run: cargo clippy --locked --manifest-path src-tauri/Cargo.toml -- -D warnings
      - run: cargo test --locked --manifest-path src-tauri/Cargo.toml
