<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Workspace spike — pygame in iframe</title>
		<style>
			body {
				margin: 0;
				padding: 1rem;
				background: #1a1a1a;
				color: #ddd;
				font-family: system-ui, sans-serif;
			}
			#status {
				font-size: 0.9rem;
				margin-bottom: 0.5rem;
				color: #aaa;
			}
			#canvas {
				display: block;
				background: #000;
				border: 1px solid #444;
			}
			.controls {
				margin-top: 1rem;
				display: flex;
				gap: 0.5rem;
				flex-wrap: wrap;
			}
			button {
				background: #2a2a2a;
				color: #ddd;
				border: 1px solid #444;
				padding: 0.4rem 0.8rem;
				font-family: inherit;
				cursor: pointer;
			}
			button:hover {
				background: #333;
			}
			#log {
				margin-top: 1rem;
				background: #0d0d0d;
				border: 1px solid #333;
				padding: 0.5rem;
				font-family: ui-monospace, monospace;
				font-size: 0.8rem;
				white-space: pre-wrap;
				max-height: 220px;
				overflow-y: auto;
			}
			.ok {
				color: #6c6;
			}
			.err {
				color: #d66;
			}
			.warn {
				color: #cc6;
			}
		</style>
	</head>
	<body>
		<div id="status">Booting Pyodide…</div>
		<canvas id="canvas" width="480" height="320" tabindex="0"></canvas>

		<div class="controls">
			<button id="btn-focus">Focus canvas (for keyboard input)</button>
		</div>

		<div id="log"></div>

		<script type="module">
			const statusEl = document.getElementById('status');
			const logEl = document.getElementById('log');

			function log(msg, cls = '') {
				const line = document.createElement('div');
				if (cls) line.className = cls;
				line.textContent = msg;
				logEl.appendChild(line);
				logEl.scrollTop = logEl.scrollHeight;
			}

			function setStatus(msg) {
				statusEl.textContent = msg;
			}

			document.getElementById('btn-focus').addEventListener('click', () => {
				document.getElementById('canvas').focus();
				log('canvas focused — try arrow keys', 'ok');
			});

			// Document the confirmed finding so anyone re-running the spike sees it.
			log('Note: window.__TAURI_INTERNALS__ is NOT injected into child iframes.', 'warn');
			log('All Tauri invoke calls must route through the parent via postMessage.', 'warn');

			async function boot() {
				try {
					setStatus('Loading Pyodide (local)…');
					const { loadPyodide } = await import('/pyodide/pyodide.mjs');
					const pyodide = await loadPyodide({
						indexURL: '/pyodide/',
						stdout: (s) => log(s),
						stderr: (s) => log(s, 'err')
					});

					setStatus('Loading pygame-ce from bundled wheels…');
					const t0 = performance.now();
					await pyodide.loadPackage(['pygame-ce']);
					log(`pygame-ce loaded in ${Math.round(performance.now() - t0)} ms`, 'ok');

					// SDL2 (which pygame uses) looks at Emscripten's Module.canvas
					// to find where to draw. Pyodide exposes setCanvas2D() to wire
					// that up. Without this call, pygame.display.set_mode() raises
					// "SDL2.ctx is undefined" inside SDL_image's createImageData.
					const canvasEl = document.getElementById('canvas');
					if (pyodide.canvas && typeof pyodide.canvas.setCanvas2D === 'function') {
						pyodide.canvas.setCanvas2D(canvasEl);
						log('pyodide.canvas.setCanvas2D bound', 'ok');
					} else {
						log('pyodide.canvas.setCanvas2D unavailable — pygame will likely fail', 'err');
					}

					setStatus('Running pygame demo (focus canvas, then use ← → ↑ ↓)');

					const code = `
import asyncio
import pygame

pygame.init()
screen = pygame.display.set_mode((480, 320))
pygame.display.set_caption("Spike")
clock = pygame.time.Clock()

x, y = 240, 160
vx, vy = 3, 2
color = (180, 120, 220)

async def main():
    running = True
    while running:
        for event in pygame.event.get():
            if event.type == pygame.QUIT:
                running = False
            elif event.type == pygame.KEYDOWN:
                print(f"key down: {pygame.key.name(event.key)}")
                if event.key == pygame.K_LEFT:  globals().__setitem__('vx', -abs(vx))
                if event.key == pygame.K_RIGHT: globals().__setitem__('vx',  abs(vx))
                if event.key == pygame.K_UP:    globals().__setitem__('vy', -abs(vy))
                if event.key == pygame.K_DOWN:  globals().__setitem__('vy',  abs(vy))
            elif event.type == pygame.MOUSEBUTTONDOWN:
                print(f"mouse click at {event.pos}")

        if x < 20 or x > 460: globals().__setitem__('vx', -vx)
        if y < 20 or y > 300: globals().__setitem__('vy', -vy)
        globals().__setitem__('x', x + vx)
        globals().__setitem__('y', y + vy)

        screen.fill((20, 20, 30))
        pygame.draw.circle(screen, color, (x, y), 20)
        pygame.display.flip()
        clock.tick(30)
        await asyncio.sleep(0)

asyncio.ensure_future(main())
`;
					await pyodide.runPythonAsync(code);
					log('pygame demo launched. Focus canvas and try arrow keys.', 'ok');
					setStatus('Running — focus the canvas and try arrow keys / mouse');
				} catch (e) {
					setStatus('Boot failed: ' + (e?.message || String(e)));
					log('boot error: ' + (e?.stack || e?.message || String(e)), 'err');
				}
			}

			boot();
		</script>
	</body>
</html>
